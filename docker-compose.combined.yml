services:
  karmabox-pro:
    container_name: karmabox-pro
    build:
      # Build context must be the parent directory so the image can copy both
      # sibling repos: hermes-agent/ and hermes-webui/.
      context: ..
      dockerfile: hermes-webui/Dockerfile.combined
    ports:
      - "127.0.0.1:8791:8791"
    volumes:
      - ${KARMABOX_PRO_HOME:-${HOME}/.karmabox_pro}:/data/.karmabox_pro
      - ${HERMES_WORKSPACE:-${HOME}/workspace}:/workspace
    environment:
      - HERMES_UID=${UID:-1000}
      - HERMES_GID=${GID:-1000}
      - HERMES_HOME=/data/.karmabox_pro
      - HERMES_BASE_HOME=/data/.karmabox_pro
      - HERMES_CONFIG_PATH=/data/.karmabox_pro/config.yaml
      - HERMES_WEBUI_STATE_DIR=/data/.karmabox_pro/webui
      - HERMES_WEBUI_DEFAULT_WORKSPACE=/workspace
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes/hermes-agent
      - HERMES_WEBUI_PYTHON=/opt/venv/bin/python
      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8791
    restart: unless-stopped
